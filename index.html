<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контрольна робота з алгебри (8 клас)</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .quiz-container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; min-height: 450px; display: flex; flex-direction: column; box-sizing: border-box; }
        h1 { font-size: 22px; color: var(--primary); text-align: center; margin-bottom: 20px; }
        .step { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.3s ease; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        label { font-weight: 600; margin-bottom: 8px; display: block; }
        select, input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .options-list { list-style: none; padding: 0; }
        .options-list li { margin-bottom: 10px; }
        .options-list label { font-weight: 400; background: #f8fafc; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; display: block; transition: 0.2s; }
        .options-list label:hover { background: #e2e8f0; }
        .nav-btns { margin-top: auto; display: flex; gap: 10px; padding-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #cbd5e1; color: var(--text); }
        .progress { position: absolute; top: 15px; right: 20px; font-size: 13px; color: #64748b; }
        .loading { text-align: center; font-size: 18px; color: var(--primary); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-container" id="main-container">
    <form id="quizForm" action="https://script.google.com/macros/s/AKfycbzYA7OhyzaZ9XET6uGltHkVRH1TE-jUcz_Z9IwvrdL8ZC5THNspgIjWSb2q6HZCMOcYmQ/exec" method="POST">
        <input type="hidden" name="total_score" id="totalScoreInput">
        
        <div class="step active" id="step-0">
            <h1>Контрольна робота: Варіант 2</h1>
            <label>Оберіть ваш клас:</label>
            <select name="class_name" required>
                <option value="">-- Оберіть клас --</option>
                <option value="8-А">8-А</option>
                <option value="8-Б">8-Б</option>
                <option value="8-В">8-В</option>
                <option value="8-Г">8-Г</option>
            </select>
            
            <label>Прізвище та Ім'я:</label>
            <input type="text" name="student_name" placeholder="Введіть ПІП" required>
            
            <div class="nav-btns">
                <button type="button" class="btn-next" onclick="nextStep(0)">Почати тест</button>
            </div>
        </div>

        <div id="dynamic-questions"></div>

        <div class="step" id="final-step">
            <h1>Тест завершено!</h1>
            <p style="text-align:center;">Всі відповіді збережено. Натисніть кнопку, щоб відправити роботу на перевірку вчителю.</p>
            <div class="nav-btns">
                <button type="button" class="btn-prev" onclick="prevStep()">Перевірити відповіді</button>
                <button type="submit" class="btn-next" id="submitBtn">Надіслати роботу</button>
            </div>
        </div>
    </form>
</div>

<script>
    const questions = [
        { q: "При якому значенні змінної x раціональний вираз (x+4)/(x-7) не має змісту?", type: "test", options: ["-4", "0", "7", "-7"], correct: "7" },
        { q: "Скоротіть раціональний дріб: 10a³b² / 15ab⁴", type: "test", options: ["2a²/3b²", "2a²/3b", "5a²/b²", "2a³/3b²"], correct: "2a²/3b²" },
        { q: "Виконайте дію додавання: 3/a + 5/b", type: "test", options: ["8/(a+b)", "(3b+5a)/ab", "15/ab", "(3a+5b)/ab"], correct: "(3b+5a)/ab" },
        { q: "Спростіть вираз: x⁻⁷ * x⁴", type: "test", options: ["x⁻¹¹", "x³", "x⁻³", "x⁻²⁸"], correct: "x⁻³" },
        { q: "Піднесіть до степеня: (m⁻²)⁻⁴", type: "test", options: ["m⁻⁶", "m⁸", "m⁻⁸", "m⁶"], correct: "m⁸" },
        { q: "Запишіть число 0,000034 у стандартному вигляді:", type: "test", options: ["3,4*10⁻⁴", "34*10⁻⁶", "3,4*10⁻⁵", "0,34*10⁻⁴"], correct: "3,4*10⁻⁵" },
        { q: "Знайдіть значення виразу: 2⁻³", type: "test", options: ["-6", "-8", "0,125", "0,25"], correct: "0,125" },
        { q: "Обчисліть значення виразу: √144 - √49", type: "test", options: ["5", "10", "13", "7"], correct: "5" },
        { q: "Винесіть множник з-під знака кореня √72:", type: "test", options: ["2√6", "6√2", "36√2", "3√8"], correct: "6√2" },
        { q: "Оберіть правильну нерівність:", type: "test", options: ["4√3 < √45", "4√3 = √45", "4√3 > √45", "4√3 < 6"], correct: "4√3 > √45" },
        { q: "Спростіть вираз: 5 / √5", type: "test", options: ["5", "1", "√5", "25"], correct: "√5" },
        { q: "Які корені має рівняння x² = 0,49?", type: "test", options: ["0,7", "0,07 та -0,07", "0,7 та -0,7", "немає"], correct: "0,7 та -0,7" },
        { q: "Укажіть коефіцієнти a, b, c для рівняння 5x - 2x² + 3 = 0:", type: "test", options: ["a=5, b=-2, c=3", "a=-2, b=5, c=3", "a=2, b=5, c=3", "a=-2, b=3, c=5"], correct: "a=-2, b=5, c=3" },
        { q: "Обчисліть дискримінант D для рівняння x² - 4x + 3 = 0:", type: "open", correct: "4" },
        { q: "Знайдіть МЕНШИЙ корінь рівняння x² + 3x - 4 = 0:", type: "open", correct: "-4" },
        { q: "За теор. Вієта знайдіть суму коренів x² - 7x + 10 = 0:", type: "open", correct: "7" },
        { q: "Ціна 800 грн знизилася на 20%. Яка нова ціна?", type: "open", correct: "640" },
        { q: "Площа 60 м², довжина на 4 м більша за ширину. Знайдіть ширину:", type: "open", correct: "6" },
        { q: "У скільки разів 10⁻⁴ м більше за 10⁻⁶ м?", type: "open", correct: "100" },
        { q: "Майстер 10 год, учень 15 год. Спільний час роботи (год):", type: "open", correct: "6" }
    ];

    let currentStep = 0;
    const dynamicContainer = document.getElementById('dynamic-questions');

    questions.forEach((item, i) => {
        const stepIndex = i + 1;
        const div = document.createElement('div');
        div.className = 'step';
        div.id = `step-${stepIndex}`;
        
        let content = `<div class="progress">Запитання ${stepIndex} з ${questions.length}</div>`;
        content += `<h1>Завдання ${stepIndex}</h1>`;
        content += `<p><b>${item.q}</b></p>`;
        
        if (item.type === "test") {
            content += `<ul class="options-list">`;
            item.options.forEach(opt => {
                content += `<li><label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label></li>`;
            });
            content += `</ul>`;
        } else {
            content += `<input type="text" name="q${i}" placeholder="Впишіть число">`;
        }
        
        content += `<div class="nav-btns">
                        <button type="button" class="btn-prev" onclick="prevStep()">Назад</button>
                        <button type="button" class="btn-next" onclick="nextStep(${stepIndex})">Далі</button>
                    </div>`;
        div.innerHTML = content;
        dynamicContainer.appendChild(div);
    });

    function nextStep(current) {
        if (current === 0) {
            const name = document.querySelector('input[name="student_name"]').value;
            const cls = document.querySelector('select[name="class_name"]').value;
            if (!name || !cls) { alert("Будь ласка, вкажіть Ім'я та Клас!"); return; }
        }
        document.getElementById(`step-${current}`).classList.remove('active');
        currentStep = current + 1;
        if (currentStep <= questions.length) {
            document.getElementById(`step-${currentStep}`).classList.add('active');
        } else {
            document.getElementById('final-step').classList.add('active');
        }
    }

    function prevStep() {
        const active = document.querySelector('.step.active');
        active.classList.remove('active');
        currentStep--;
        document.getElementById(`step-${currentStep}`).classList.add('active');
    }

    document.getElementById('quizForm').onsubmit = function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Надсилаю...";

        let score = 0;
        questions.forEach((item, i) => {
            const input = this.elements[`q${i}`];
            let val = item.type === "test" ? (Array.from(input).find(r => r.checked)?.value || "") : input.value.trim();
            if (val === item.correct) score++;
        });
        
        document.getElementById('totalScoreInput').value = score + " з 20";
        
        const data = new FormData(this);
        fetch(this.action, {
            method: 'POST',
            body: new URLSearchParams(data)
        })
        .then(() => {
            document.getElementById('main-container').innerHTML = "<h1>✅ Роботу здано!</h1><p style='text-align:center;'>Твій результат збережено в журналі вчителя. Можеш закривати сторінку.</p>";
        })
        .catch(err => {
            alert("Помилка при відправці. Спробуйте ще раз.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Надіслати роботу";
        });
    };
</script>

</body>
</html>
